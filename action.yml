name: 'Check Markdown'
description: 'Return errors found on a pull request with problems in .md and .ipynb files.'
author: "John Aziz"
branding:
  color: "green"
  icon: "check-circle"

inputs:
  command:
    description: The function to run and validate.
    type: choice
    required: true
    default: check_broken_paths
    options:
    - check_broken_paths
    - check_broken_urls
    - check_paths_tracking
    - check_urls_tracking
    - check_urls_locale
  directory:
    description: The directory that contains .md and .ipynb files.
    required: true
    default: ./
  guide-url:
    description: The contribution guide full URL, linked in the report. When unset, uses guide-url from pyproject.toml if present, otherwise no guide link is included.
    required: false
    default: ''
  github-token:
    description: GitHub token
    required: true
    default: ''
  extensions:
    description: Comma-separated file extensions to check. When unset, uses pyproject.toml if present, otherwise '.md,.ipynb'.
    required: false
    default: ''
  tracking-domains:
    description: Comma-separated hostnames that must carry a wt.mc_id tracking parameter. Only affects check_urls_tracking. When unset, uses pyproject.toml if present, otherwise 'github.com,microsoft.com,visualstudio.com,aka.ms,azure.com'.
    required: false
    default: ''
  skip-files:
    description: Comma-separated file names to exclude from checking. When unset, uses pyproject.toml if present, otherwise 'CODE_OF_CONDUCT.md,SECURITY.md'.
    required: false
    default: ''
  skip-domains:
    description: Comma-separated domains to exclude from URL checks. Only affects check_broken_urls and check_urls_locale.
    required: false
    default: ''
  skip-urls-containing:
    description: Comma-separated URL substrings to exclude from URL checks. Only affects check_broken_urls and check_urls_locale.
    required: false
    default: ''
  timeout:
    description: Per-request timeout in seconds for URL checks (0-50). When unset, uses pyproject.toml if present, otherwise 20.
    required: false
    default: ''
  retries:
    description: Number of attempts before a URL is reported as broken (0-10). When unset, uses pyproject.toml if present, otherwise 3.
    required: false
    default: ''
  retry-on-429:
    description: Whether a 429 response is retried honouring Retry-After instead of reported immediately as rate_limited (true/false). When unset, uses pyproject.toml if present, otherwise true.
    required: false
    default: ''
  fallback-retry-delay:
    description: Seconds reported as the retry delay when a 429 carries no Retry-After header (0-300). When unset, uses pyproject.toml if present, otherwise 30.
    required: false
    default: ''
  max-workers:
    description: Maximum number of concurrent URL-check worker threads. When unset, uses pyproject.toml if present, otherwise the number of available CPUs.
    required: false
    default: ''
  per-host-delay:
    description: Minimum delay in seconds enforced between two requests to the same host (0.0-10.0). When unset, uses pyproject.toml if present, otherwise 0.5.
    required: false
    default: ''
  report-format:
    description: Report format written when error-level issues are found. When unset, uses pyproject.toml if present, otherwise markdown.
    type: choice
    required: false
    default: ''
    options:
    - console
    - github-annotations
    - json
    - markdown
  config:
    description: Path to a TOML file to read [tool.markdown-checker] configuration from, instead of discovering pyproject.toml.
    required: false
    default: ''
  isolated:
    description: Ignore pyproject.toml configuration entirely for this run.
    type: boolean
    required: false
    default: 'false'

runs:
  using: "composite"
  steps:
    - name: Setup Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: '3.11'
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install markdown-checker
      shell: bash

    - name: Generate Random File Name
      id: report-file
      shell: bash
      run: echo "name=$(echo $RANDOM$RANDOM)" >> "$GITHUB_OUTPUT"

    - name: Run markdown-checker
      shell: bash
      env:
        INPUT_DIRECTORY: ${{ inputs.directory }}
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_GUIDE_URL: ${{ inputs.guide-url }}
        INPUT_EXTENSIONS: ${{ inputs.extensions }}
        INPUT_TRACKING_DOMAINS: ${{ inputs.tracking-domains }}
        INPUT_SKIP_FILES: ${{ inputs.skip-files }}
        INPUT_TIMEOUT: ${{ inputs.timeout }}
        INPUT_RETRIES: ${{ inputs.retries }}
        INPUT_RETRY_ON_429: ${{ inputs.retry-on-429 }}
        INPUT_FALLBACK_RETRY_DELAY: ${{ inputs.fallback-retry-delay }}
        INPUT_MAX_WORKERS: ${{ inputs.max-workers }}
        INPUT_PER_HOST_DELAY: ${{ inputs.per-host-delay }}
        INPUT_REPORT_FORMAT: ${{ inputs.report-format }}
        INPUT_SKIP_DOMAINS: ${{ inputs.skip-domains }}
        INPUT_SKIP_URLS_CONTAINING: ${{ inputs.skip-urls-containing }}
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_ISOLATED: ${{ inputs.isolated }}
        OUTPUT_FILE_NAME: ${{ steps.report-file.outputs.name }}
      run: |
        args=(
          --dir "$INPUT_DIRECTORY"
          --func "$INPUT_COMMAND"
          --output-file-name "$OUTPUT_FILE_NAME"
        )

        if [ -n "$INPUT_GUIDE_URL" ]; then
          args+=(--guide-url "$INPUT_GUIDE_URL")
        fi

        if [ -n "$INPUT_EXTENSIONS" ]; then
          args+=(--extensions "$INPUT_EXTENSIONS")
        fi

        if [ -n "$INPUT_TRACKING_DOMAINS" ]; then
          args+=(--tracking-domains "$INPUT_TRACKING_DOMAINS")
        fi

        if [ -n "$INPUT_SKIP_FILES" ]; then
          args+=(--skip-files "$INPUT_SKIP_FILES")
        fi

        if [ -n "$INPUT_TIMEOUT" ]; then
          args+=(--timeout "$INPUT_TIMEOUT")
        fi

        if [ -n "$INPUT_RETRIES" ]; then
          args+=(--retries "$INPUT_RETRIES")
        fi

        if [ "$INPUT_RETRY_ON_429" = "true" ]; then
          args+=(--retry-on-429)
        elif [ "$INPUT_RETRY_ON_429" = "false" ]; then
          args+=(--no-retry-on-429)
        fi

        if [ -n "$INPUT_FALLBACK_RETRY_DELAY" ]; then
          args+=(--fallback-retry-delay "$INPUT_FALLBACK_RETRY_DELAY")
        fi

        if [ -n "$INPUT_PER_HOST_DELAY" ]; then
          args+=(--per-host-delay "$INPUT_PER_HOST_DELAY")
        fi

        if [ -n "$INPUT_REPORT_FORMAT" ]; then
          args+=(--report-format "$INPUT_REPORT_FORMAT")
        fi

        if [ -n "$INPUT_SKIP_DOMAINS" ]; then
          args+=(--skip-domains "$INPUT_SKIP_DOMAINS")
        fi

        if [ -n "$INPUT_SKIP_URLS_CONTAINING" ]; then
          args+=(--skip-urls-containing "$INPUT_SKIP_URLS_CONTAINING")
        fi

        if [ -n "$INPUT_MAX_WORKERS" ]; then
          args+=(--max-workers "$INPUT_MAX_WORKERS")
        fi

        if [ -n "$INPUT_CONFIG" ]; then
          args+=(--config "$INPUT_CONFIG")
        fi

        if [ "$INPUT_ISOLATED" = "true" ]; then
          args+=(--isolated)
        fi

        markdown-checker "${args[@]}"

    - name: Check for report file
      id: report
      if: ${{ always() }}
      shell: bash
      env:
        REPORT_NAME: ${{ steps.report-file.outputs.name }}
      run: |
        found=false
        for ext in .md .json .txt; do
          if [ -f "./$REPORT_NAME$ext" ]; then
            found=true
            echo "file=$REPORT_NAME$ext" >> "$GITHUB_OUTPUT"
            break
          fi
        done
        echo "found=$found" >> "$GITHUB_OUTPUT"

    - name: Set job summary
      if: ${{ always() && steps.report.outputs.found == 'true' }}
      shell: bash
      env:
        REPORT_FILE: ${{ steps.report.outputs.file }}
      run: cat "./$REPORT_FILE" >> "$GITHUB_STEP_SUMMARY"

    - name: Note PR comment skipped on fork
      if: ${{ always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
      shell: bash
      run: |
        echo "::notice::Skipping PR comment sync: pull requests from forks get a read-only GITHUB_TOKEN, so this action cannot post or update comments here. The job summary and exit status above still reflect the check result."

    - name: Sync PR comment
      if: ${{ always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        COMMAND: ${{ inputs.command }}
        REPORT_FOUND: ${{ steps.report.outputs.found }}
        REPORT_FILE: ${{ steps.report.outputs.file }}
      run: |
        marker="<!-- action-check-markdown:${COMMAND} -->"

        # Find this check's existing comment (if any) by its hidden marker.
        comment_id="$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
          --paginate \
          --jq ".[] | select(.body | startswith(\"${marker}\")) | .id" \
          | head -n 1)"

        if [ "$REPORT_FOUND" = "true" ]; then
          # Issues found: create or update the report comment.
          printf '%s\n\n' "$marker" > comment-body.md
          cat "./$REPORT_FILE" >> comment-body.md
        elif [ -n "$comment_id" ]; then
          # No issues, but a previous failure comment exists: mark it resolved,
          # with the same heading style as the report templates.
          case "$COMMAND" in
            check_broken_paths) title="Check Broken Paths" ;;
            check_broken_urls) title="Check Broken URLs" ;;
            check_paths_tracking) title="Check Missing Tracking from Paths" ;;
            check_urls_tracking) title="Check Missing Tracking from URLs" ;;
            check_urls_locale) title="Check Country Locale in URLs" ;;
            *) title="Check Markdown" ;;
          esac
          printf '%s\n# %s\n\n✅ No issues found. All previously reported issues have been resolved.\n' \
            "$marker" "$title" > comment-body.md
        else
          # No issues and no previous comment: keep the PR uncluttered.
          echo "No issues and no existing comment; skipping."
          exit 0
        fi

        if [ -n "$comment_id" ]; then
          gh api "repos/${REPO}/issues/comments/${comment_id}" --jq .body > existing-body.md
          if cmp -s comment-body.md existing-body.md; then
            echo "Comment already up to date; skipping update."
            exit 0
          fi
          gh api --method PATCH "repos/${REPO}/issues/comments/${comment_id}" \
            -F body=@comment-body.md > /dev/null
        else
          gh api --method POST "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            -F body=@comment-body.md > /dev/null
        fi

    - name: Update workflow run status
      if: ${{ always() && steps.report.outputs.found == 'true' }}
      shell: bash
      run: exit 1
