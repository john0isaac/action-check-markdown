name: 'Check Markdown'
description: 'Return errors found on a pull request with problems in .md and .ipynb files.'
author: "John Aziz"
branding:
  color: "green"
  icon: "check-circle"

inputs:
  command:
    description: The function to run and validate.
    type: choice
    required: true
    default: check_broken_paths
    options:
    - check_broken_paths
    - check_broken_urls
    - check_paths_tracking
    - check_urls_tracking
    - check_urls_locale
  directory:
    description: The directory that contains .md and .ipynb files.
    required: true
    default: ./
  guide-url:
    description: The contribution guide full URL.
    required: true
    default: 'https://github.com/john0isaac/action-check-markdown/blob/main/CONTRIBUTING.md'
  github-token:
    description: GitHub token
    required: true
    default: ''
  extensions:
    description: Comma-separated file extensions to check.
    required: false
    default: '.md,.ipynb'
  tracking-domains:
    description: Comma-separated hostnames that must carry a wt.mc_id tracking parameter. Only affects check_urls_tracking.
    required: false
    default: 'github.com,microsoft.com,visualstudio.com,aka.ms,azure.com'
  skip-files:
    description: Comma-separated file names to exclude from checking.
    required: false
    default: 'CODE_OF_CONDUCT.md,SECURITY.md'
  skip-domains:
    description: Comma-separated domains to exclude from URL checks. Only affects check_broken_urls and check_urls_locale.
    required: false
    default: ''
  skip-urls-containing:
    description: Comma-separated URL substrings to exclude from URL checks. Only affects check_broken_urls and check_urls_locale.
    required: false
    default: ''
  timeout:
    description: Per-request timeout in seconds for URL checks (0-50).
    required: false
    default: '20'
  retries:
    description: Number of attempts before a URL is reported as broken (0-10).
    required: false
    default: '3'
  retry-on-429:
    description: Whether a 429 response is reported immediately as rate_limited instead of retried with exponential backoff.
    type: boolean
    required: false
    default: 'true'
  fallback-retry-delay:
    description: Seconds reported as the retry delay when a 429 carries no Retry-After header (0-300).
    required: false
    default: '30'
  max-workers:
    description: Maximum number of concurrent URL-check worker threads. Defaults to the number of available CPUs when unset.
    required: false
    default: ''
  per-host-delay:
    description: Minimum delay in seconds enforced between two requests to the same host (0.0-10.0).
    required: false
    default: '0.5'
  report-format:
    description: Report format written when error-level issues are found.
    type: choice
    required: false
    default: markdown
    options:
    - console
    - github-annotations
    - json
    - markdown
  config:
    description: Path to a TOML file to read [tool.markdown-checker] configuration from, instead of discovering pyproject.toml.
    required: false
    default: ''
  isolated:
    description: Ignore pyproject.toml configuration entirely for this run.
    type: boolean
    required: false
    default: 'false'

runs:
  using: "composite"
  steps:
    - name: Setup Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: '3.11'
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install markdown-checker
      shell: bash

    - name: Generate Random File Name
      id: report-file
      shell: bash
      env:
        REPORT_FORMAT: ${{ inputs.report-format }}
      run: |
        echo "name=$(echo $RANDOM$RANDOM)" >> "$GITHUB_OUTPUT"
        case "$REPORT_FORMAT" in
          markdown) echo "ext=.md" >> "$GITHUB_OUTPUT" ;;
          json) echo "ext=.json" >> "$GITHUB_OUTPUT" ;;
          *) echo "ext=.txt" >> "$GITHUB_OUTPUT" ;;
        esac

    - name: Run markdown-checker
      shell: bash
      env:
        INPUT_DIRECTORY: ${{ inputs.directory }}
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_GUIDE_URL: ${{ inputs.guide-url }}
        INPUT_EXTENSIONS: ${{ inputs.extensions }}
        INPUT_TRACKING_DOMAINS: ${{ inputs.tracking-domains }}
        INPUT_SKIP_FILES: ${{ inputs.skip-files }}
        INPUT_TIMEOUT: ${{ inputs.timeout }}
        INPUT_RETRIES: ${{ inputs.retries }}
        INPUT_RETRY_ON_429: ${{ inputs.retry-on-429 }}
        INPUT_FALLBACK_RETRY_DELAY: ${{ inputs.fallback-retry-delay }}
        INPUT_MAX_WORKERS: ${{ inputs.max-workers }}
        INPUT_PER_HOST_DELAY: ${{ inputs.per-host-delay }}
        INPUT_REPORT_FORMAT: ${{ inputs.report-format }}
        INPUT_SKIP_DOMAINS: ${{ inputs.skip-domains }}
        INPUT_SKIP_URLS_CONTAINING: ${{ inputs.skip-urls-containing }}
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_ISOLATED: ${{ inputs.isolated }}
        OUTPUT_FILE_NAME: ${{ steps.report-file.outputs.name }}
      run: |
        args=(
          --dir "$INPUT_DIRECTORY"
          --func "$INPUT_COMMAND"
          --guide-url "$INPUT_GUIDE_URL"
          --output-file-name "$OUTPUT_FILE_NAME"
          --extensions "$INPUT_EXTENSIONS"
          --tracking-domains "$INPUT_TRACKING_DOMAINS"
          --skip-files "$INPUT_SKIP_FILES"
          --timeout "$INPUT_TIMEOUT"
          --retries "$INPUT_RETRIES"
          --fallback-retry-delay "$INPUT_FALLBACK_RETRY_DELAY"
          --per-host-delay "$INPUT_PER_HOST_DELAY"
          --report-format "$INPUT_REPORT_FORMAT"
        )

        if [ "$INPUT_RETRY_ON_429" = "true" ]; then
          args+=(--retry-on-429)
        else
          args+=(--no-retry-on-429)
        fi

        if [ -n "$INPUT_SKIP_DOMAINS" ]; then
          args+=(--skip-domains "$INPUT_SKIP_DOMAINS")
        fi

        if [ -n "$INPUT_SKIP_URLS_CONTAINING" ]; then
          args+=(--skip-urls-containing "$INPUT_SKIP_URLS_CONTAINING")
        fi

        if [ -n "$INPUT_MAX_WORKERS" ]; then
          args+=(--max-workers "$INPUT_MAX_WORKERS")
        fi

        if [ -n "$INPUT_CONFIG" ]; then
          args+=(--config "$INPUT_CONFIG")
        fi

        if [ "$INPUT_ISOLATED" = "true" ]; then
          args+=(--isolated)
        fi

        markdown-checker "${args[@]}"

    - name: Set job summary
      if: ${{ always() && hashFiles(format('./{0}{1}', steps.report-file.outputs.name, steps.report-file.outputs.ext)) != '' }}
      shell: bash
      env:
        REPORT_FILE: ${{ format('{0}{1}', steps.report-file.outputs.name, steps.report-file.outputs.ext) }}
      run: cat "./$REPORT_FILE" >> "$GITHUB_STEP_SUMMARY"

    - name: Post comment
      if: ${{ always() && github.event_name == 'pull_request' && hashFiles(format('./{0}{1}', steps.report-file.outputs.name, steps.report-file.outputs.ext)) != '' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PR_URL: ${{ github.event.pull_request.html_url }}
        REPORT_FILE: ${{ format('{0}{1}', steps.report-file.outputs.name, steps.report-file.outputs.ext) }}
      run: gh pr comment "$PR_URL" -F "./$REPORT_FILE"

    - name: Update workflow run status
      if: ${{ always() && hashFiles(format('./{0}{1}', steps.report-file.outputs.name, steps.report-file.outputs.ext)) != '' }}
      shell: bash
      run: exit 1
